<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DICE ROLL</title>
    <link rel="icon" type="image/x-icon" href="img/diceForFavicon32.png" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #00a651;
        font-family: Arial, Helvetica, sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      #container { position: fixed; inset: 0; }

      #ui {
        position: fixed;
        top: 0; left: 0; right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 18px;
        padding: 14px 10px;
        z-index: 10;
        flex-wrap: wrap;
      }
      #types, #counts { display: flex; gap: 4px; }
      .chip {
        font: 11px/1 Arial, Helvetica, sans-serif;
        letter-spacing: 0.08em;
        color: #fff;
        background: transparent;
        border: 1px solid #fff;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
      }
      .chip.on { background: #fff; color: #00a651; }
      .chip:hover { opacity: 0.8; }
      #clear {
        font: 11px/1 Arial, Helvetica, sans-serif;
        letter-spacing: 0.08em;
        color: #fff;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
      }
      #clear:hover { border-color: #fff; }

      #hud {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        display: flex;
        justify-content: center;
        gap: 24px;
        padding: 16px;
        z-index: 10;
        color: #fff;
        font-size: 13px;
        letter-spacing: 0.06em;
        pointer-events: none;
      }
      #labels {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }
      .die-label {
        position: absolute;
        transform: translate(-50%, -100%);
        color: #fff;
        font: bold 15px Arial, Helvetica, sans-serif;
        text-shadow: 0 0 4px rgba(0, 0, 0, 0.35);
      }
      .die-label.unsure { opacity: 0.55; }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="ui">
      <div id="types"></div>
      <div id="counts"></div>
      <button id="clear">clear</button>
    </div>
    <div id="labels"></div>
    <div id="hud"><span id="roll"></span><span id="field"></span></div>

    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.min.js",
          "cannon-es": "./vendor/cannon-es.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
